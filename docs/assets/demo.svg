<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520" width="840" height="520">
  <style>
    /* 20s total: type 5-15%, output 18-72%, hold 72-100% */
    @keyframes typeLine1 {
      0%, 5% { width: 0 }
      15% { width: 400px }
      100% { width: 400px }
    }
    @keyframes cursor {
      0%, 49% { opacity: 1 }
      50%, 100% { opacity: 0 }
    }
    @keyframes showCursor1 {
      0%, 5% { opacity: 1 }
      15.5% { opacity: 0 }
      100% { opacity: 0 }
    }
    @keyframes fadeIn1  { 0%, 18% { opacity: 0 } 20% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn2  { 0%, 23% { opacity: 0 } 25% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn3  { 0%, 28% { opacity: 0 } 30% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn4  { 0%, 34% { opacity: 0 } 36% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn5  { 0%, 39% { opacity: 0 } 41% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn6  { 0%, 44% { opacity: 0 } 46% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn7  { 0%, 50% { opacity: 0 } 52% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn8  { 0%, 55% { opacity: 0 } 57% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn9  { 0%, 58% { opacity: 0 } 60% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn10 { 0%, 63% { opacity: 0 } 65% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn11 { 0%, 66% { opacity: 0 } 68% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes progressBar {
      0%, 68% { width: 0 }
      78% { width: 280px }
      100% { width: 280px }
    }
    @keyframes fadeIn12 { 0%, 78% { opacity: 0 } 80% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes fadeIn13 { 0%, 80% { opacity: 0 } 82% { opacity: 1 } 100% { opacity: 1 } }
    /* hold from 82% to 100% = 3.6s static */

    .term-bg { fill: #1a1b26; rx: 10; ry: 10; }
    .titlebar { fill: #24283b; }
    .dot-r { fill: #f7768e; } .dot-y { fill: #e0af68; } .dot-g { fill: #9ece6a; }
    .title-text { fill: #565f89; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .prompt { fill: #7aa2f7; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
    .cmd { fill: #c0caf5; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
    .arg { fill: #9ece6a; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
    .output { fill: #a9b1d6; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .highlight { fill: #bb9af7; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .success { fill: #9ece6a; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .dim { fill: #565f89; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .accent { fill: #7dcfff; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
  </style>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="cmd-clip">
      <rect x="48" y="52" width="0" height="30" style="animation: typeLine1 20s ease-in-out infinite"/>
    </clipPath>
  </defs>

  <!-- Terminal window -->
  <rect class="term-bg" x="20" y="10" width="800" height="500" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect class="titlebar" x="20" y="10" width="800" height="36" rx="10" ry="10"/>
  <rect class="titlebar" x="20" y="30" width="800" height="16"/>
  <circle class="dot-r" cx="46" cy="28" r="6.5"/>
  <circle class="dot-y" cx="68" cy="28" r="6.5"/>
  <circle class="dot-g" cx="90" cy="28" r="6.5"/>
  <text class="title-text" x="420" y="33" text-anchor="middle">claude ~ MultiAgentAnalytics</text>

  <!-- Prompt line -->
  <text class="prompt" x="36" y="72">$</text>
  <g clip-path="url(#cmd-clip)">
    <text class="cmd" x="52" y="72">/analyze-deep</text>
    <text class="arg" x="192" y="72">data/titanic/train.csv</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="52" y="58" width="9" height="18" fill="#c0caf5" opacity="0"
        style="animation: showCursor1 20s ease-in-out infinite, cursor 0.8s step-end infinite"/>

  <!-- Phase 1 -->
  <g style="animation: fadeIn1 20s ease-in-out infinite; opacity: 0">
    <text class="dim" x="36" y="104">Phase 1</text>
    <text class="highlight" x="108" y="104">domain-expert</text>
    <text class="output" x="244" y="104">analyzing data structure...</text>
  </g>

  <g style="animation: fadeIn2 20s ease-in-out infinite; opacity: 0">
    <text class="success" x="52" y="126">&#x2713;</text>
    <text class="output" x="72" y="126">Domain: Passenger survival prediction (Titanic)</text>
  </g>

  <g style="animation: fadeIn3 20s ease-in-out infinite; opacity: 0">
    <text class="success" x="52" y="148">&#x2713;</text>
    <text class="output" x="72" y="148">Target variable: Survived | Key features: Pclass, Sex, Age</text>
  </g>

  <!-- Phase 2 -->
  <g style="animation: fadeIn4 20s ease-in-out infinite; opacity: 0">
    <text class="dim" x="36" y="178">Phase 2</text>
    <text class="highlight" x="108" y="178">data-analyst</text>
    <text class="output" x="228" y="178">running full profile...</text>
  </g>

  <g style="animation: fadeIn5 20s ease-in-out infinite; opacity: 0">
    <text class="success" x="52" y="200">&#x2713;</text>
    <text class="output" x="72" y="200">891 rows x 12 cols | 19.9% missing in Age | 77.1% missing in Cabin</text>
  </g>

  <g style="animation: fadeIn6 20s ease-in-out infinite; opacity: 0">
    <text class="success" x="52" y="222">&#x2713;</text>
    <text class="output" x="72" y="222">Pclass-Fare correlation: -0.67 | Survival rate: 48.5%</text>
  </g>

  <!-- Phase 3 -->
  <g style="animation: fadeIn7 20s ease-in-out infinite; opacity: 0">
    <text class="dim" x="36" y="252">Phase 3</text>
    <text class="highlight" x="108" y="252">visualizer</text>
    <text class="output" x="212" y="252">generating plots...</text>
  </g>

  <g style="animation: fadeIn8 20s ease-in-out infinite; opacity: 0">
    <text class="accent" x="52" y="274">&#x25A0;</text>
    <text class="output" x="72" y="274">plot_hist_age.png</text>
    <text class="accent" x="252" y="274">&#x25A0;</text>
    <text class="output" x="272" y="274">plot_scatter_age_fare.png</text>
  </g>

  <g style="animation: fadeIn9 20s ease-in-out infinite; opacity: 0">
    <text class="accent" x="52" y="296">&#x25A0;</text>
    <text class="output" x="72" y="296">plot_heatmap.png</text>
    <text class="accent" x="252" y="296">&#x25A0;</text>
    <text class="output" x="272" y="296">plot_bar_survival.png</text>
  </g>

  <!-- Phase 4 -->
  <g style="animation: fadeIn10 20s ease-in-out infinite; opacity: 0">
    <text class="dim" x="36" y="326">Phase 4</text>
    <text class="highlight" x="108" y="326">reporter</text>
    <text class="output" x="196" y="326">integrating results...</text>
  </g>

  <!-- Progress bar -->
  <g style="animation: fadeIn11 20s ease-in-out infinite; opacity: 0">
    <text class="dim" x="52" y="350">Building report</text>
    <rect x="196" y="338" width="290" height="14" rx="7" fill="#24283b"/>
    <rect x="198" y="340" height="10" rx="5" fill="#7aa2f7" style="animation: progressBar 20s ease-in-out infinite; width: 0"/>
  </g>

  <!-- Separator -->
  <g style="animation: fadeIn12 20s ease-in-out infinite; opacity: 0">
    <text class="dim" x="36" y="382">&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;</text>
  </g>

  <!-- Completion (holds until 100%) -->
  <g style="animation: fadeIn13 20s ease-in-out infinite; opacity: 0">
    <text class="success" x="36" y="408">&#x2714; Analysis complete!</text>
    <text class="output" x="36" y="432">Report saved to:</text>
    <text class="accent" x="196" y="432">output/titanic/report_deep_analysis.md</text>
    <text class="output" x="36" y="456">Visualizations:</text>
    <text class="accent" x="196" y="456">output/titanic/*.png</text>
    <text class="dim" x="36" y="480">4 agents | 4 phases | 4 plots | 1 report</text>

    <text class="prompt" x="36" y="504">$</text>
    <rect x="52" y="490" width="9" height="18" fill="#c0caf5" style="animation: cursor 0.8s step-end infinite"/>
  </g>
</svg>
